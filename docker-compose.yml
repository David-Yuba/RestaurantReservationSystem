services:
  cert-gen:
      image: mcr.microsoft.com/dotnet/sdk:8.0
      volumes:
        - ./cert:/cert
      command: sh -c "dotnet dev-certs https --export-path /cert/cert.pfx --password 123456789 && chmod 777 /cert/cert.pfx"
  db:
      image: mcr.microsoft.com/mssql/server:2022-latest
      environment:
        SA_PASSWORD: "ASDkjkfsjd@.DKfj23dk"
        ACCEPT_EULA: "Y"
        MSSQL_SA_PASSWORD: "ASDkjkfsjd@.DKfj23dk"
        MSSQL_PID: "Express"
      ports:
        - "1433:1433"
      volumes:
        - sqldata:/var/lib/mssql/data
        - ./db-init:/db-init
      entrypoint: /bin/bash /db-init/entrypoint.sh
  reservationsys-lamaisonrestaurant:
    image: ${DOCKER_REGISTRY-}reservationsyslamaisonrestaurant
    build:
      context: .
      dockerfile: ReservationSys-LaMaisonRestaurant/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ReservationSys_LaMaisonRestaurantContext=Server=db,1433;Database=ReservationSys_LaMaisonRestaurantContext-850da8c0-aea8-406c-aa63-e086e40a9c01;User Id=sa;Password=ASDkjkfsjd@.DKfj23dk;TrustServerCertificate=True
      - Kestrel__Certificates__Default__Path=/cert/cert.pfx
      - Kestrel__Certificates__Default__Password=123456789
    volumes:
      - ./cert:/cert
    healthcheck:
        test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ASDkjkfsjd@.DKfj23dk" -Q "SELECT 1" -No
        interval: 10s
        timeout: 5s
        retries: 5
volumes:
  sqldata: